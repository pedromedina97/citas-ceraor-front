<app-nav></app-nav>

<div class="container mt-5">
    <div class="row">
        <div class="col mt-5">
            <div class="card shadow-lg p-3 mb-5 bg-body-tertiary rounded">
                <div class="card-header">
                    <h3 class="card-title">Permisos Asignados</h3>
                    
                </div>
                <div class="card-body">
                    <div class="scrollable-list">
                        <ul class="list-group list-group-flush" style="">
                            <li class="list-group-item" *ngFor="let item of allpermissions">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" [id]="'perm-' + item.id"
                                        [(ngModel)]="item.selected" (change)="onCheckboxChange($event, item.id)">
                                    <label class="form-check-label" [for]="'perm-' + item.id">
                                        {{ item.name }} - {{item.description}}
                                    </label>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="card-footer text-end">
                    <button class="btn btn-primary mt-3" (click)="savePermissions()">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>
</div>
