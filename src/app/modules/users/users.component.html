<app-nav></app-nav>
<div class="container mt-5">
  <div class="row">
    <div class="col-12">
      <div class="card shadow p-3 mb-5 bg-body-tertiary rounded">
        <div class="card-body">
          <form>
            <div class="input-group mb-3">
              <input type="text" class="form-control" [ngModelOptions]="{standalone: true}" autocomplete="off"
                [(ngModel)]="filterText" (input)="filter()">

              <button class="btn btn-outline-primary" type="button" data-bs-toggle="modal"
                data-bs-target="#createModal"><i class="bi bi-plus-circle"></i> Crear</button>
            </div>

          </form>
        </div>
      </div>

    </div>
    <div class="col">
      <div class="card shadow p-3 mb-5 bg-body-tertiary rounded">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover">
              <thead>
                <tr>
                  <th scope="col">Email</th>
                  <th scope="col">Nombre</th>
                  <th scope="col">Creado</th>
                  <th scope="col">Opciones</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let user of filtered">
                  <th scope="row">{{user.email}}</th>
                  <td>{{user.name}} {{user.lastname}}</td>
                  <td>{{user.created_at | date:'dd/MM/yyyy'}}</td>
                  <td>
                    <button class="btn btn-outline-warning"  data-bs-toggle="modal" data-bs-target="#editModal" (click)="getInstance(user, user.id)">
                      <i class="bi bi-pencil-square"></i>
                    </button>
                    <button class="btn btn-outline-danger" (click)="delete(user.id, user.name)">
                      <i class="bi bi-trash"></i>
                    </button>
                  </td>
                </tr>
              </tbody>

            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="createModal"  tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Crear Usuario</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form #form="ngForm">
        <div class="container">
          <div class="row">
            <div class="col">
              <div class="form-group">
                <input type="text" placeholder="Nombre" name="name" id="" class="form-control mb-2" [(ngModel)]="dataInstance.name">
                <input type="text" placeholder="Apellidos" name="lastname" id="" class="form-control mb-2" [(ngModel)]="dataInstance.lastname">
                <input type="date" class="form-control mb-2" name="birthday" placeholder="Nacimiento" id="" [(ngModel)]="dataInstance.birthday">
                <input type="text" placeholder="Dirección" name="address" id="" class="form-control mb-2" [(ngModel)]="dataInstance.address">
              </div>
            </div>
            <div class="col">
              <div class="form-group">
                <input type="email" placeholder="email" name="email" id="" class="form-control mb-2" [(ngModel)]="dataInstance.email">
                <input type="password" placeholder="password" name="password" id="" class="form-control mb-2 d-none" [(ngModel)]="dataInstance.password">
                <input type="text" placeholder="Teléfono" name="phone" id="" class="form-control mb-2" [(ngModel)]="dataInstance.phone">
              </div>
            </div>
          </div>
        </div>
      </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-warning" data-bs-dismiss="modal">Cerrar</button>
        <button type="button" class="btn btn-success" (click)="create(form)">Guardar</button>
      </div>
    </div>
  </div>
</div>


<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Crear Usuario</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form #form="ngForm">
        <div class="container">
          <div class="row">
            <div class="col">
              <div class="form-group">
                <input type="text" placeholder="Nombre" name="name" id="" class="form-control mb-2" [(ngModel)]="dataInstance.name">
                <input type="text" placeholder="Apellidos" name="lastname" id="" class="form-control mb-2" [(ngModel)]="dataInstance.lastname">
                <input type="date" class="form-control mb-2" name="birthday" placeholder="Nacimiento" id="" [(ngModel)]="dataInstance.birthday">
                <input type="text" placeholder="Dirección" name="address" id="" class="form-control mb-2" [(ngModel)]="dataInstance.address">
              </div>
            </div>
            <div class="col">
              <div class="form-group">
                <input type="email" placeholder="email" name="email" id="" class="form-control mb-2" [(ngModel)]="dataInstance.email">
                <input type="password" placeholder="password" name="password" id="" class="form-control mb-2 d-none" [(ngModel)]="dataInstance.password">
                <input type="text" placeholder="Teléfono" name="phone" id="" class="form-control mb-2" [(ngModel)]="dataInstance.phone">
              </div>
            </div>
          </div>
        </div>
      </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-warning" data-bs-dismiss="modal">Cerrar</button>
        <button type="button" class="btn btn-success" (click)="editInstance(form)">Editar</button>
      </div>
    </div>
  </div>
</div>
