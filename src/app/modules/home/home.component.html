<div class="dashboard-container">
  <h2 class="dashboard-title">Panel de Control</h2>
  <div class="container-fluid">
    <div class="row">
      <div class="card-grid">
        <div class="dashboard-card">
          <h3>Clientes Registrado</h3>
          <p><span class="counter">{{data?.total_clientes}}</span></p>
        </div>
        <div class="dashboard-card">
          <h3>Citas del mes</h3>
          <p><span class="counter">{{data?.total_citas_mes}}</span></p>
        </div>
        <div class="dashboard-card">
          <h3>Ingresos del mes</h3>
          <p><span class="counter">{{ data?.ganancia_mes | currency: 'MXN':'symbol' }}</span></p>
        </div>
      </div>

    </div>
    <div class="row justify-content-center gy-4 mt-3">
      <!-- Gráfica de línea -->
      <div class="col-12 col-lg-6">
        <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
          <div class="card-body">
            <h5 class="card-title fw-semibold text-muted mb-4 text-center">
              <i class="bi bi-calendar-date"></i> Ingresos del Mes
            </h5>
            <div class="d-flex justify-content-center mb-3">
              <select class="form-select w-auto" (change)="onMonthChange($event)">
                <option *ngFor="let m of months" [value]="m.value" [selected]="m.value === selectedMonth">
                  {{ m.label }}
                </option>
              </select>
            </div>

            <div class="chart-container" style="">
              <canvas #chartCanvas></canvas>
            </div>
          </div>
        </div>
      </div>
      <!-- Ingreso semanal -->
      <div class="col-12 col-lg-6">
        <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
          <div class="card-body">
            <h5 class="card-title fw-semibold text-muted mb-4 text-center">
              <i class="bi bi-calendar-week"></i> Ingresos semanales
            </h5>
            <canvas #weeklyCanvas></canvas>
          </div>
        </div>
      </div>

      <!-- TOP -->
      <div class="col-12 col-lg-4">
        <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
          <div class="card-body">
            <h5 class="card-title fw-semibold text-muted mb-4 text-center">
              <i class="bi bi-list-task"></i> Servicios más solicitados
            </h5>
            <canvas #barCanvas></canvas>
          </div>
        </div>
      </div>
      <!-- Gráfica de pastel -->
      <div class="col-12 col-lg-4">
        <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
          <div class="card-body text-center">
            <h5 class="card-title fw-semibold text-muted mb-4"><i class="bi bi-pie-chart-fill"></i> Ganancias por
              Sucursal</h5>
            <div class="chart-container" style="width: 100%; max-width: 300px; margin: auto;">
              <canvas #pieCanvas></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>


  </div>
