<div class="container login-container shadow-lg p-4 bg-white rounded-4 mt-5" style="max-width: 900px; border: 1px solid #e0e0e0;">
  <div class="row login-card d-flex align-items-center">
    <!-- Columna Izquierda (Imagen) -->
    <div class="col-md-6 login-img d-none d-md-flex justify-content-center align-items-center rounded-start-4">
      <img src="../../../assets/logo_ceraor.svg" alt="Logo" class="img-fluid" style="max-height: 300px;">
    </div>

    <!-- Columna Derecha (Formulario) -->
    <div class="col-md-6 p-5">
      <h3 class="text-center mb-4 fw-bold text-primary">Iniciar Sesión</h3>
      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
          <form #form="ngForm" (ngSubmit)="login(form)">
            <div class="mb-3">
              <label for="email" class="form-label">Correo Electrónico</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control border-start-0 rounded-end-3" name="email" [(ngModel)]="credentials.email" placeholder="name@example.com" required>
              </div>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control border-start-0 rounded-end-3" name="password" [(ngModel)]="credentials.password" placeholder="********" autocomplete="false" required>
              </div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label" for="remember">Recordarme</label>
              </div>
              <a href="#" class="text-decoration-none text-primary">¿Olvidaste tu contraseña?</a>
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-3 shadow-sm">Ingresar</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
