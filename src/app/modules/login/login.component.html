<div class="container login-container shadow-lg p-3 mb-5 bg-body-tertiary rounded mt-5">
    <div class="row login-card bg-white">
        <!-- Columna Izquierda (Imagen) -->
        <div class="col-md-6 login-img">
            <img src="../../../assets/logo_ceraor.svg" alt="">
        </div>

        <!-- Columna Derecha (Formulario) -->
        <div class="col-md-6 p-5">
            <h3 class="text-center mb-4">Iniciar Sesión</h3>
            <div class="card ">
                <div class="card-body">
                    <form #form="ngForm" (ngSubmit)="login(form)">
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo Electrónico</label>
                            <input type="email" class="form-control" name="email" [(ngModel)]="credentials.email" placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" placeholder="Password" [(ngModel)]="credentials.password" name="password">
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">
                                <label class="form-check-label" for="remember">Recordarme</label>
                            </div>
                            <a href="#" class="text-decoration-none">¿Olvidaste tu contraseña?</a>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                    </form>
                </div>
            </div>
            
        </div>
    </div>
</div>
