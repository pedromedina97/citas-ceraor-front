<div class="container mt-5">
  <div class="row justify-content-center">
    <!-- Buscador y botón de creación -->
    <div class="col-lg-6 col-md-8 col-sm-12 mt-5">
      <div class="card shadow-lg p-4 rounded-lg fade-in">
        <div class="card-body">
          <form>
            <div class="input-group">
              <input type="text" class="form-control input-ios" [ngModelOptions]="{standalone: true}" autocomplete="off"
                [(ngModel)]="filterText" (input)="filter()" placeholder="Buscar orden...">
              <a *ngIf="canShow('create_order')" class="btn btn-primary btn-ios" [routerLink]="['create-order']">
                <i class="bi bi-plus-circle"></i> Crear
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Tabla de Usuarios -->
    <div class="col-lg-10 col-md-12 col-sm-12 mt-4">
      <div class="card shadow-lg p-4 rounded-lg fade-in">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover">
              <thead class="table-light">
                <tr>
                  <th>Folio</th>
                  <th>Paciente</th>
                  <th>Email</th>
                  <th>Teléfono</th>
                  <th>Doctor</th>
                  <th>Dirección</th>
                  <th>Creación</th>
                  <th>Opciones</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let order of filtered">
                  <td *ngIf="order.appointment_code == null">Sin Folio</td>
                  <td *ngIf="order.appointment_code !== null">{{order.appointment_code}}</td>
                  <td>{{ order.patient }}</td>
                  <td>{{ order.email }}</td>
                  <td>{{ order.phone }}</td>
                  <td>{{ order.doctor }}</td>
                  <td>{{ order.address }}</td>
                  <td>{{ order.created_at | date:'dd/MM/yyyy' }}</td>
                  <td>
                    <!-- <button *ngIf="canShow('update_order')" class="btn btn-outline-warning btn-sm me-2"
                      data-bs-toggle="modal" data-bs-target="#editModal">
                      <i class="bi bi-pencil-square"></i>
                    </button> -->
                    <!-- Con appointment_code -->
                    <button *ngIf="order.appointment_code !== null"
                      (click)="downloadPdf(env.url + 'file/getfile/download/' + order.appointment_code + '.pdf', order.appointment_code)"
                      class="btn btn-outline-danger btn-sm">
                      <i class="bi bi-file-earmark-pdf-fill"></i>
                    </button>

                    <!-- Sin appointment_code (usa el ID) -->
                    <button *ngIf="order.appointment_code == null"
                      (click)="downloadPdf(env.url + 'file/getfile/downloadbyid/' + order.id + '.pdf', order.id)"
                      class="btn btn-outline-primary btn-sm">
                      <i class="bi bi-file-earmark-pdf-fill"></i>
                    </button>


                    <!-- <button *ngIf="canShow('delete_order')" class="btn btn-outline-danger btn-sm"
                      (click)="delete(order.id, order.name)">
                      <i class="bi bi-trash"></i>
                    </button> -->
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
