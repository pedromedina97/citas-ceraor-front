<pagination-template
  class="pagination_container"
  #p="paginationApi"
  (pageChange)="pageChange.emit($event)"
>
  <div class="pagination-previous" [class.disabled]="p.isFirstPage()">
    <a (click)="p.previous()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15.1602 7.41L10.5802 12L15.1602 16.59L13.7502 18L7.75016 12L13.7502 6L15.1602 7.41Z" fill="#C4CDD5"/>
      </svg>
    </a>
  </div>
 
  <div
    *ngFor="let page of p.pages"
    [class.current]="p.getCurrent() === page.value"
  >
    <a
      class="page__number"
      (click)="p.setCurrent(page.value)"
      *ngIf="p.getCurrent() !== page.value"
    >
      <span>{{ page.label }}</span>
    </a>
    <div *ngIf="p.getCurrent() === page.value">
      <span>{{ page.label }}</span>
    </div>
  </div>
 
  <div class="pagination-next" [class.disabled]="p.isLastPage()">
    <a *ngIf="!p.isLastPage()" (click)="p.next()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8.83984 7.41L13.4198 12L8.83984 16.59L10.2498 18L16.2498 12L10.2498 6L8.83984 7.41Z" fill="#C4CDD5"/>
      </svg>
    </a>
  </div>
</pagination-template>
